{% if settings is defined and settings %}
  {% if settings.is_running %}
    <span class="flex items-center gap-2 text-xs">
      <span class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></span>
      <span class="font-semibold {{ 'text-amber-400' if settings.paper_trading else 'text-green-400' }}">
        {{ "PAPER" if settings.paper_trading else "LIVE" }}
      </span>
      {% if settings.last_poll_at %}
        <span class="text-gray-600">· {{ settings.last_poll_at[11:19] }} UTC</span>
      {% endif %}
    </span>
  {% else %}
    <span class="flex items-center gap-2 text-xs">
      <span class="w-2 h-2 rounded-full bg-gray-600"></span>
      <span class="text-gray-500">Stopped</span>
    </span>
  {% endif %}
{% else %}
  <span class="text-gray-700 text-xs">—</span>
{% endif %}
