{% extends "base.html" %}
{% block title %}Logs · PM Copy Bot{% endblock %}
{% block nav_logs %}border-b-2 border-indigo-400 text-white{% endblock %}

{% block content %}
<div class="space-y-4 h-full">

  <div class="flex items-center justify-between">
    <h1 class="text-xl font-semibold text-white">Live Logs</h1>
    <button class="bg-gray-800 hover:bg-gray-700 text-gray-300 text-xs font-medium px-4 py-2 rounded-lg transition-colors"
            hx-post="/logs/clear"
            hx-target="#log-output"
            hx-swap="innerHTML">
      Clear
    </button>
  </div>

  <div class="bg-[#161b27] border border-gray-800 rounded-xl p-4
              font-mono text-xs text-gray-400 h-[72vh] overflow-y-auto leading-relaxed"
       id="log-output"
       hx-get="/logs/data"
       hx-trigger="every 3s"
       hx-swap="innerHTML"
       hx-on::after-swap="this.scrollTop = this.scrollHeight">
    {% include "partials/log_viewer.html" %}
  </div>

</div>
{% endblock %}
